name: Minecraft Server with playit.gg & Cloudflared

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read config.json
        id: config
        run: |
          echo "SERVER_FILE=$(jq -r '.server_file_name' config.json)" >> $GITHUB_OUTPUT
          echo "SERVER_ARGS=$(jq -r '.server_args' config.json)" >> $GITHUB_OUTPUT
          echo "JAVA_VER=$(jq -r '.java_version' config.json)" >> $GITHUB_OUTPUT

      - name: Download latest server.7z from release
        id: download
        uses: robinraju/release-downloader@v1
        with:
          latest: true
          fileName: 'server.7z'
        continue-on-error: true

      - name: Extract server.7z (if downloaded)
        if: steps.download.outcome == 'success'
        uses: edgarrc/action-7z@v1
        with:
          args: 7z x server.7z -aoa

      - name: Create server folder if extraction was skipped
        if: steps.download.outcome != 'success'
        run: mkdir -p server

      - name: Fix permissions
        run: |
          sudo chown -R $(whoami) server
          sudo chmod -R 755 server

      - name: Download server JAR from config URL
        run: |
          JAR_URL=$(jq -r '.server_jar_url' config.json)
          JAR_NAME=$(jq -r '.server_file_name' config.json)
          if [ -z "$JAR_URL" ] || [ "$JAR_URL" = "null" ]; then
            echo "⚠️ No server_jar_url set – skipping."
          elif [ -f "server/$JAR_NAME" ]; then
            echo "✅ JAR already exists."
          else
            curl -L -f -o "server/$JAR_NAME" "$JAR_URL" || exit 1
            echo "✅ Downloaded JAR."
          fi

      - name: Ensure server binds to all interfaces
        run: |
          mkdir -p server
          if [ ! -f server/server.properties ]; then
            printf 'server-ip=0.0.0.0\nenable-jmx-monitoring=false\n' > server/server.properties
          else
            grep -q '^server-ip=' server/server.properties || echo 'server-ip=0.0.0.0' >> server/server.properties
            sed -i 's/^server-ip=.*/server-ip=0.0.0.0/' server/server.properties
          fi

      - name: Download mods
        run: python mod_downloader.py

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ steps.config.outputs.JAVA_VER }}

      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Start cloudflared tunnels
        run: |
          cloudflared tunnel --url http://localhost:8084 > cf_browser.log 2>&1 &
          cloudflared tunnel --url http://localhost:8082 > cf_fetcher.log 2>&1 &
          cloudflared tunnel --url http://localhost:9000 > cf_controller.log 2>&1 &
          sleep 15
          grep -o 'https://[^ ]*\.trycloudflare\.com' cf_*.log || true

      - name: Download and prepare playit.gg
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          curl -SsL https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64 -o playit
          chmod +x playit
          mkdir -p /tmp/playit ~/.config/playit_gg

          printf 'secret_key = "%s"\n' "$PLAYIT_SECRET" > ~/.config/playit_gg/playit.toml
          cat >> ~/.config/playit_gg/playit.toml << 'TOML'
          no_start_io_thread = true

          [[tunnels]]
          name = "Minecraft Java"
          tunnel_type = "minecraft-java"
          local_ip = "127.0.0.1"
          local_port = 25565
          TOML

          echo "✅ playit.gg binary and config ready."

      - name: Start File Browser
        run: |
          curl -fsSL https://raw.githubusercontent.com/filebrowser/get/master/get.sh | bash
          filebrowser --root ./server --port 8084 --address 0.0.0.0 --noauth > fb.log 2>&1 &
          sleep 3

      - name: Start File Fetcher
        run: |
          cd server
          python ../file_fetcher.py > ../ff.log 2>&1 &
          cd ..
          sleep 3

      - name: Start Minecraft server and wait until ready
        run: |
          cd server
          nohup java ${{ steps.config.outputs.SERVER_ARGS }} -jar ${{ steps.config.outputs.SERVER_FILE }} nogui > mc.log 2>&1 &
          echo $! > ../mc.pid
          cd ..

          echo "⏳ Waiting for Minecraft server to accept connections on port 25565..."
          for i in $(seq 1 90); do
            if nc -z localhost 25565 2>/dev/null; then
              echo "✅ Minecraft server is listening on port 25565!"
              break
            fi
            if [ $i -eq 90 ]; then
              echo "❌ Timed out after 3 minutes. Last 30 lines of server log:"
              tail -30 server/mc.log
              exit 1
            fi
            sleep 2
          done

      - name: Start playit.gg tunnel
        run: |
          echo "Starting playit agent (server is confirmed listening)..."
          ./playit --socket-path /tmp/playit/playit.sock > playit.log 2>&1 &

          sleep 15

          echo "=== PLAYIT OUTPUT LOGS ==="
          cat playit.log || true
          echo "=========================="

          echo "=== LAST 10 LINES OF MINECRAFT LOG ==="
          tail -10 server/mc.log || true
          echo "======================================="

      - name: Start Server Controller (attach mode)
        run: |
          cd server
          python ../server_control.py 9000 19800 --attach java ${{ steps.config.outputs.SERVER_ARGS }} -jar ${{ steps.config.outputs.SERVER_FILE }} nogui

      - name: Delete previous 'latest' release
        if: ${{ always() }}
        uses: liudonghua123/delete-release-action@v1
        with:
          release_name: 'latest'
        continue-on-error: true

      - name: Compress server folder
        if: ${{ always() }}
        uses: edgarrc/action-7z@v1
        with:
          args: 7z a server.7z server/

      - name: Upload to release
        if: ${{ always() }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: server.7z
          asset_name: server.7z
          tag: latest
          release_name: server
          overwrite: true
          body: "Minecraft server data – auto-updated"

      - name: Shutdown tunnels
        if: ${{ !cancelled() }}
        uses: AnimMouse/setup-cloudflared/shutdown@v2